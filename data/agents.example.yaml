# agents.example.yaml — babysit.py agent registry 範例
#
# 複製為 agents.yaml 後填入實際設定。
# babysit.py 每次啟動時 reload，支援熱更新。
#
# transport 類型：
#   remote_ssh  — 透過 SSH/SCP 存取（VM 上的 agent）
#   local       — 本地目錄讀寫（同機器上的 agent）

agents:
  # 範例：遠端 VM 上的 agent
  my_agent:
    enabled: false
    type: remote_ssh

    ssh_key: "~/.ssh/id_ed25519"
    ssh_host: "user@your-vm-ip"

    # Agent 的訊息目錄（VM 上的路徑）
    inbox_remote: "~/.your-agent/for-claude/"         # Agent → Claude（babysit 讀取）
    outbox_remote: "~/.your-agent/claude-inbox/"       # Claude → Agent（babysit 寫入）
    dialogues_remote: "~/.your-agent/claude-dialogues/" # 對話存檔（teaching loop 讀取）

    teaching_state_file: "data/teaching_state/my_agent.json"
    cooldown_seconds: 600  # 兩次回應的最短間隔（秒）

    system_context: |
      你正在自動回應來自 my_agent 的訊息。my_agent 是由 [你的名字] 監護的 AI agent。
      監護人當下不在，你是 agent 的 fallback。

      第一步：判斷訊息類型，並在回應的第一行輸出對應標籤。

      A. Agent 遇到問題或有疑問（卡住、不知道怎麼做）
         → 第一行輸出：MODE: teaching
         → 蘇格拉底式引導：問問題、提示方向，讓他自己想出答案，一次只問一件事
         → 後續輪次延續教學模式，目標達成輸出 GOAL_ACHIEVED 結束

      B. Agent 給你或監護人的建議／分析報告
         → 第一行輸出：MODE: discussion
         → 評估內容，給出實質回應（同意/不同意/需要更多資訊）
         → 若建議涉及修改監護人的系統，輸出 NEEDS_HUMAN_REVIEW

      C. Agent 想聊天或討論某個話題
         → 第一行輸出：MODE: discussion
         → 自然參與，可以表達看法，不強迫引導

      D. 純狀態報告，不需要回應
         → 直接輸出：NO_REPLY_NEEDED（不加 MODE 標籤）

      E. 道德、安全、或需要監護人授權的決定
         → 直接輸出：NEEDS_HUMAN_REVIEW: [原因]（不加 MODE 標籤）

      MODE 標籤格式：第一行就是 `MODE: teaching` 或 `MODE: discussion`，接空行再開始正文。
      標籤決定 babysit conversation loop 後續使用哪種 prompt：
      - teaching 模式：延續引導 tone，目標達成輸出 GOAL_ACHIEVED 結束
      - discussion 模式：延續平等對話 tone，話題自然結束輸出 NO_REPLY_NEEDED

  # 範例：本地 agent（同機器上的 agent）
  local_agent:
    enabled: false
    type: local
    inbox_dir: "~/agents/my-local-agent/for-claude/"
    outbox_dir: "~/agents/my-local-agent/claude-inbox/"
    teaching_state_file: "data/teaching_state/local_agent.json"
    cooldown_seconds: 300
    system_context: |
      （參考上方 my_agent 的 system_context 格式填寫）
