# Symbiont 設定檔
# 路徑設計原則：
#   - 使用 ~ 展開（跨平台），不寫死絕對路徑
#   - Symbiont 自身資料用相對路徑（相對於專案根目錄）
#   - 機器差異只在此檔調整，程式碼不寫死任何路徑

paths:
  # ── Claude Code 全域設定 ─────────────────────────────────────
  # sessions_base：所有 Claude Code 專案的 session 根目錄
  # evolve.py 遞迴掃此目錄下所有 .jsonl，不限於特定專案
  claude_projects_base: "~/.claude/projects"

  # ── 主專案（memory 操作用）────────────────────────────────────
  # primary_project：指定 memory_audit.py 操作哪個專案的 memory/
  #
  # 優先序（程式依此順序決定使用哪個值）：
  #   1. 環境變數 LOCAL_AGENT_PRIMARY_PROJECT（最高優先，部署 / CI 用）
  #   2. 此欄位（填入 workdir 路徑，留空 "" 則跳到步驟 3）
  #   3. 自動偵測：掃 claude_projects_base，取最近有 session 的子目錄
  #
  # 範例：
  #   Windows：primary_project: "C:/claudehome"
  #   Mac：    primary_project: "/Users/xxx/claudehome"
  #   留空讓程式自動偵測：primary_project: ""
  primary_project: ""

  # primary_project_dir / memory_dir / memory_index 由程式自動組合：
  #   primary_project_dir = {claude_projects_base}/{encode(primary_project)}
  #   memory_dir          = primary_project_dir/memory
  #   memory_index        = memory_dir/MEMORY.md

  # ── 全域規則檔 ────────────────────────────────────────────────
  # evolve.py 讀寫此檔（習慣規則全域共用，不分專案）
  global_claude_md: "~/.claude/CLAUDE.md"

  # ── wrap 完成旗標 ──────────────────────────────────────────────
  # wrap skill 完成後寫入此固定路徑，evolve.py --skip-if-wrap-done 讀取
  # 固定在 ~/.claude/ 確保 wrap skill 和 Symbiont 雙方都能直接存取
  wrap_done_file: "~/.claude/.wrap_done.txt"

  # ── Symbiont 自身資料（相對於專案根目錄）─────────────────
  data_dir: "data"
  state_file: "data/state.json"
  pending_evolve: "data/pending_evolve.txt"
  pending_audit: "data/pending_audit.txt"
  error_log: "data/error.log"
  audit_log: "data/audit.log"

  # ── evolution_log（留空 = 自動建立在 data/ 下）───────────────
  # 已有歷史記錄的用戶：填入現有路徑以保留連續性
  # 範例 Windows："C:/Users/xxx/my-project/evolution_log.md"
  # 範例 Mac：    "~/my-project/evolution_log.md"
  evolution_log: ""

  # ── claude CLI ────────────────────────────────────────────────
  # 通常 "claude" 即可（setup script 確保 PATH 正確）
  # Task Scheduler 環境若找不到，改為絕對路徑
  # 範例 Windows：C:/Users/<username>/AppData/Roaming/npm/claude.cmd
  # 範例 Mac：    /usr/local/bin/claude
  claude_cli: "claude"

  # ── 備份目標（選填，留空則跳過備份）─────────────────────────
  # 範例 Windows：~/Desktop/backup-claude
  # 範例 Mac：~/Documents/backup-claude
  backup_dir: ""

claude_runner:
  timeout_seconds: 120
  max_retries: 2

session_reader:
  max_turns: 50          # 只取最後 N 輪，避免 prompt 過長

memory_audit:
  enabled: true                    # 自動維護 memory/；設 false 可停用
  auto_archive: true               # false = 只報告不移動任何檔案
  thoughts_archive_threshold: 30   # thoughts/ 超過此數量 → 最舊 10 條移至 archive
  memory_index_warn_lines: 170     # MEMORY.md 超過此行數 → 輸出警告

evolve:
  distill_threshold: 25            # existing rules + new rules >= 此數觸發蒸餾；0 = 停用

synthesize:
  sessions_per_cycle: 10           # 每 N 次 evolve 觸發一次 synthesis
  ctx_cap_chars: 12000             # 所有 session fragment 總字數上限
  friction_per_session: 1500       # 每 session 摩擦片段上限（chars）
  habit_per_session: 800           # 每 session 習慣片段上限（chars）
  min_evidence_sessions: 3         # pattern 至少出現在幾個 session 才生成 skill
  skill_stdev_multiplier: 2.0      # 低於 mean - N×stdev 視為低使用率
  skill_low_cycles_to_delete: 2    # 連續幾次低使用率才刪除 skill

babysit:
  teaching_timeout_seconds: 1800   # teaching loop 等待 agent 回應的逾時（秒）
  lock_max_age_seconds: 900        # babysit.lock 超過此秒視為崩潰遺留，強制刪除
